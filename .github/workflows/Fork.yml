name: Update From Johnshall

on:
  # 最佳化 1：配合上游更新時間。設定為 UTC 0:15（香港時間早上 8:15），確保拉取到當日最新釋出的規則
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  update-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 升級至 v4 提升效能與 Node.js 相容性

      - name: Create or Clear TMP_Source directory
        run: |
          rm -rf TMP_Source
          mkdir -p TMP_Source

      - name: Download specific files in parallel
        run: |
          cd TMP_Source
          
          # 最佳化 2：將 URL 集中管理
          urls=(
            "https://raw.githubusercontent.com/Johnshall/Shadowrocket-ADBlock-Rules-Forever/refs/heads/release/sr_top500_whitelist_ad.conf"
            "https://raw.githubusercontent.com/Johnshall/Shadowrocket-ADBlock-Rules-Forever/refs/heads/release/sr_cnip_ad.conf"
            "https://raw.githubusercontent.com/Johnshall/Shadowrocket-ADBlock-Rules-Forever/refs/heads/release/sr_ad_only.conf"
            "https://raw.githubusercontent.com/Johnshall/Shadowrocket-ADBlock-Rules-Forever/refs/heads/release/sr_proxy_banad.conf"
          )

          # 最佳化 3：並行下載 (Parallel Downloads) 與防呆機制
          for url in "${urls[@]}"; do
            # 使用 -f 避免下載到 404 錯誤網頁，-O 自動解析檔名，& 丟到背景同時下載
            curl -sSLfO "$url" &
          done
          
          # 等待所有背景下載任務完成
          wait
          echo "All files downloaded successfully."

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5 # 升級至 v5
        with:
          commit_message: "Auto-updated latest rules from Johnshall"
          branch: main
          file_pattern: TMP_Source/*
