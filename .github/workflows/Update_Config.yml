name: Update Config Files

on:
  # 最佳化 1：修改執行時間！
  # 設定為 UTC 0:25 (香港時間早上 8:25)，確保它在您的 "Update From Johnshall" (8:15) 下載完新規則後才執行
  schedule:
    - cron: '25 0 * * *'
  workflow_dispatch:

jobs:
  update-config: # 或 update-rules
    runs-on: ubuntu-latest
    
    # 加上這一段環境變數，強制 Actions 使用 Node.js 24 來消除警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 最佳化 2：升級至 v4

      # 新增步驟：建立自訂規則片段，供稍後注入使用
      - name: Create custom rule fragments
        run: |
          cat << 'EOF' > apple_rules.txt
          # --- Custom Apple Rules (News Proxy + App Store Direct) ---
          DOMAIN,news-client.apple.com,PROXY
          DOMAIN,news-edge.apple.com,PROXY
          DOMAIN,news-events.apple.com,PROXY
          DOMAIN,apple.comscoreresearch.com,PROXY
          DOMAIN-SUFFIX,apple.news,PROXY
          DOMAIN-SUFFIX,apple.com,DIRECT
          DOMAIN-SUFFIX,appstore.com,DIRECT
          DOMAIN-SUFFIX,mzstatic.com,DIRECT
          DOMAIN-SUFFIX,icloud.com,DIRECT
          DOMAIN-SUFFIX,icloud-content.com,DIRECT
          DOMAIN-SUFFIX,me.com,DIRECT
          DOMAIN-SUFFIX,aaplimg.com,DIRECT
          DOMAIN-SUFFIX,cdn-apple.com,DIRECT
          # --------------------------------------------------------
          EOF

          cat << 'EOF' > google_rewrite.txt
          # --- Redirect regional Google to pure Google.com ---
          ^https?:\/\/(www\.)?google\.com\.hk https://www.google.com 302
          ^https?:\/\/(www\.)?google\.cn https://www.google.com 302
          # ---------------------------------------------------
          EOF

      # 最佳化 3 & 4：使用迴圈合併重複步驟，並採用正則表達式取代固定行數
      - name: Copy and apply personal preferences & custom rules
        run: |
          # 建立一個關聯陣列 (Dictionary)，對應來源檔案與目標檔案
          declare -A configs=(
            ["TMP_Source/sr_cnip_ad.conf"]="CN_AD.conf"
            ["TMP_Source/sr_top500_whitelist_ad.conf"]="TOP500_WHITE_AD.conf"
            ["TMP_Source/sr_proxy_banad.conf"]="PROXYALL_AD.conf"
          )
          
          # 遍歷陣列進行處理
          for src in "${!configs[@]}"; do
            dest="${configs[$src]}"
            
            # 確保來源檔案存在
            if [ ! -f "$src" ]; then
              echo "Error: $src is missing!"
              exit 1
            fi
            
            echo "Processing $dest..."
            cp "$src" "$dest"
            
            # 1. 替換基礎設定
            sed -i 's/^ipv6 =.*/ipv6 = true/' "$dest"
            sed -i 's/^dns-server =.*/dns-server = 1.1.1.1, 223.5.5.5/' "$dest"
            
            # 2. 注入 Apple 規則 (防呆機制：使用 grep 抓取行號，避開 sed 符號解析錯誤)
            RULE_LINE=$(grep -n -m 1 "^\[Rule\]" "$dest" | cut -d: -f1)
            if [ -n "$RULE_LINE" ]; then
              sed -i "${RULE_LINE}r apple_rules.txt" "$dest"
            fi
            
            # 3. 注入 Google URL Rewrite 規則 (防呆機制)
            REWRITE_LINE=$(grep -n -m 1 "^\https://ahrefs.com/writing-tools/paragraph-rewriter" "$dest" | cut -d: -f1)
            if [ -n "$REWRITE_LINE" ]; then
              sed -i "${REWRITE_LINE}r google_rewrite.txt" "$dest"
            fi
            
            # 4. 處理 MITM，將 Google 的 HK 與 CN 網域附加到現有的 hostname 列表最後面
            sed -i 's/^hostname =.*/&, *.google.com.hk, *.google.cn/' "$dest"
            
          done

      # 最佳化 5：檢查並提交
      - name: Commit and push changes
        run: |
          git config user.name "Pandit"
          git config user.email "pandit@panditpan.tk"
          git add CN_AD.conf TOP500_WHITE_AD.conf PROXYALL_AD.conf
          
          # 檢查是否有變更，有變更才 commit 與 push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated Configs with personal preferences, Apple & Google fixes" && git push)
